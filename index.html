<html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chain Reaction</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="container">

    <h1>CHAIN REACTION</h1>

    <div class="top-bar">
        <div id="current-player">Current Turn: Player 1</div>
        <div id="game-timer">Game Time: 300</div>
        <div id="turn-timer">Turn Time: 15</div>
    </div>

    <div class="scoreboard">
        <div class="score player1">Player 1: <span id="score1">0</span></div>
        <div class="score player2">Player 2: <span id="score2">0</span></div>
    </div>

    <div id="board"></div>

    <div class="controls">
        <button id="pause-btn">Pause</button>
        <button id="resume-btn">Resume</button>
        <button id="restart-btn">Restart</button>
    </div>

    <div class="history-container">
        <h2>Move History</h2>
        <ul id="history"></ul>
    </div>

    <div id="winner-popup" class="hidden">
        <div class="popup-box">
            <h2 id="winner-text"></h2>
            <button onclick="location.reload()">Play Again</button>
        </div>
    </div>

</div>

<script src="state_manager.js"></script>
<script src="game_engine.js"></script>
<script src="ui_controller.js"></script>
<script src="timer_manager.js"></script>
<script src="main.js"></script>

</body>
</html>
